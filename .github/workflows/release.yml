name: Release Launcher

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      windows_sign:
        description: 'Sign Windows Package'
        required: false
        type: 'boolean'
        default: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: mlugg/setup-zig@v2
        with:
          version: '0.13.0'

      - name: Install zigbuild
        run: |
          cargo install --locked cargo-zigbuild

      - name: Install targets
        run: |
          rustup target add x86_64-pc-windows-msvc
          rustup target add aarch64-pc-windows-msvc

      - name: Build
        run: |
          cargo build --target x86_64-pc-windows-msvc --release
          cargo build --target aarch64-pc-windows-msvc --release

      - name: Stage Windows Launchers
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release/windows | Out-Null
          Copy-Item target/x86_64-pc-windows-msvc/release/JavaLauncher.exe release/windows/JavaLauncher-x86_64-pc-windows-msvc.exe
          Copy-Item target/aarch64-pc-windows-msvc/release/JavaLauncher.exe release/windows/JavaLauncher-aarch64-pc-windows-msvc.exe

      # Upload artifacts
      - name: Upload Windows Launchers
        uses: actions/upload-artifact@v7
        id: upload
        with:
          name: Windows-Launchers
          if-no-files-found: error
          path: |
            release/windows/JavaLauncher-x86_64-pc-windows-msvc.exe
            release/windows/JavaLauncher-aarch64-pc-windows-msvc.exe

      - name: Windows Signing
        if: github.event.inputs.windows_sign == 'true'
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ secrets.SIGNPATH_ORG_ID }}'
          project-slug: 'AstroImageJ_Why'
          signing-policy-slug: 'release-signing'
          github-artifact-id: '${{ steps.upload.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: 'signpath/output'
          wait-for-completion-timeout-in-seconds: 900
          service-unavailable-timeout-in-seconds: 900

      - name: Upload Signed Windows Installer
        if: github.event.inputs.windows_sign == 'true'
        uses: actions/upload-artifact@v7
        with:
          retention-days: 7
          path: signpath/output
          name: signed-windows-installers
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: mlugg/setup-zig@v2
        with:
          version: '0.13.0'

      - name: Install zigbuild
        run: |
          cargo install --locked cargo-zigbuild

      - name: Install targets
        run: |
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin

      - name: Build
        run: |
          cargo build --target x86_64-apple-darwin --release
          cargo build --target aarch64-apple-darwin --release

      # Upload artifacts
      - name: Upload x86_64-apple-darwin
        uses: actions/upload-artifact@v7
        with:
          name: JavaLauncher-x86_64-apple-darwin
          if-no-files-found: error
          path: |
            target/x86_64-apple-darwin/release/JavaLauncher
      - name: Upload aarch64-apple-darwin
        uses: actions/upload-artifact@v7
        with:
          name: JavaLauncher-aarch64-apple-darwin
          if-no-files-found: error
          path: |
            target/aarch64-apple-darwin/release/JavaLauncher

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: mlugg/setup-zig@v2
        with:
          version: '0.13.0'

      - name: Install zigbuild
        run: |
          cargo install --locked cargo-zigbuild

      - name: Install targets
        run: |
          rustup target add x86_64-unknown-linux-gnu
          rustup target add aarch64-unknown-linux-gnu

      - name: Build
        run: |
          cargo zigbuild --target x86_64-unknown-linux-gnu --release
          cargo zigbuild --target aarch64-unknown-linux-gnu --release

      # Upload artifacts
      - name: Upload x86_64-unknown-linux-gnu
        uses: actions/upload-artifact@v7
        with:
          name: JavaLauncher-x86_64-unknown-linux-gnu
          if-no-files-found: error
          path: |
            target/x86_64-unknown-linux-gnu/release/JavaLauncher
      - name: Upload aarch64-unknown-linux-gnu
        uses: actions/upload-artifact@v7
        with:
          name: JavaLauncher-aarch64-unknown-linux-gnu
          if-no-files-found: error
          path: |
            target/aarch64-unknown-linux-gnu/release/JavaLauncher
